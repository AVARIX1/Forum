<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Forum Profesional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ======== GLOBAL ======== */
body {
  margin: 0;
  background: #0d0d0d;
  color: #eee;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ======== NAVBAR ======== */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: #111;
  border-bottom: 1px solid #222;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 10;
}

.logo {
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 2px;
}

.nav-right button {
  margin-left: 10px;
  padding: 8px 14px;
  background: #3b82f6;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  color: white;
  font-weight: bold;
}

.nav-right button:hover {
  background: #2563eb;
}

/* ======== SIDEBAR ======== */
#sidebar {
  width: 280px;
  background: #111;
  padding-top: 80px;
  border-right: 1px solid #222;
  overflow-y: auto;
}

#profile-box {
  text-align: center;
  padding: 20px;
}

#profile-pic {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #222;
  object-fit: cover;
  border: 3px solid #333;
}

#profile-email {
  margin-top: 10px;
  font-size: 16px;
  font-weight: bold;
}

#sidebar ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
}

#sidebar li {
  padding: 15px;
  cursor: pointer;
  border-bottom: 1px solid #222;
}

#sidebar li:hover,
#sidebar li.active {
  background: #1a1a1a;
}

/* ======== MAIN CONTENT ======== */
#content {
  flex: 1;
  padding: 80px 30px 30px 30px;
  overflow-y: auto;
}

#post-box {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 20px;
}

#post-content {
  width: 100%;
  height: 80px;
  background: #111;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 10px;
  color: #eee;
  resize: none;
}

#post-box button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  background: #3b82f6;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.post {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  border: 1px solid #222;
  transition: 0.2s;
}

.post:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 15px #000;
}

.meta {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}

/* ======== MODALS ======== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 20;
}

.modal-content {
  background: #111;
  padding: 30px;
  border-radius: 10px;
  width: 350px;
  position: relative;
  animation: pop 0.2s ease;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-content input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 6px;
  color: #eee;
}

.modal-content button {
  width: 100%;
  padding: 10px;
  background: #3b82f6;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.close {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 22px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="logo">FORUM</div>
  <div class="nav-right">
    <button id="btn-login" onclick="openLogin()">Login</button>
    <button id="btn-register" onclick="openRegister()">Register</button>
    <div id="user-info" style="display:none;">
      <span id="user-email"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div id="profile-box">
    <img id="profile-pic" src="https://i.imgur.com/1Q9Z1Zm.png">
    <div id="profile-email"></div>
  </div>

  <ul>
    <li class="active">General</li>
    <li>Gaming</li>
    <li>Programare</li>
    <li>Întrebări</li>
    <li>Off-topic</li>
  </ul>
</aside>

<!-- MAIN CONTENT -->
<main id="content">
  <div id="post-box" style="display:none;">
    <textarea id="post-content" placeholder="Scrie o postare..."></textarea>
    <button onclick="createPost()">Publică</button>
    <p id="post-msg"></p>
  </div>

  <div id="posts"></div>
</main>

<!-- LOGIN MODAL -->
<div class="modal" id="login-modal">
  <div class="modal-content">
    <h2>Login</h2>
    <input id="log-email" type="email" placeholder="Email">
    <input id="log-pass" type="password" placeholder="Parolă">
    <button onclick="login()">Intră</button>
    <p id="log-msg"></p>
    <span class="close" onclick="closeLogin()">×</span>
  </div>
</div>

<!-- REGISTER MODAL -->
<div class="modal" id="register-modal">
  <div class="modal-content">
    <h2>Register</h2>
    <input id="reg-email" type="email" placeholder="Email">
    <input id="reg-pass" type="password" placeholder="Parolă">
    <button onclick="register()">Creează cont</button>
    <p id="reg-msg"></p>
    <span class="close" onclick="closeRegister()">×</span>
  </div>
</div>

<script>
/* ======== API ======== */
const API = "";

/* ======== AUTH STATE ======== */
let token = localStorage.getItem("token");
let email = localStorage.getItem("email");

/* ======== UI UPDATE ======== */
function updateUI() {
  if (token) {
    document.getElementById("btn-login").style.display = "none";
    document.getElementById("btn-register").style.display = "none";
    document.getElementById("user-info").style.display = "flex";
    document.getElementById("user-email").textContent = email;
    document.getElementById("profile-email").textContent = email;
    document.getElementById("post-box").style.display = "block";
  }
}
updateUI();

/* ======== MODALS ======== */
function openLogin() { document.getElementById("login-modal").style.display = "flex"; }
function closeLogin() { document.getElementById("login-modal").style.display = "none"; }
function openRegister() { document.getElementById("register-modal").style.display = "flex"; }
function closeRegister() { document.getElementById("register-modal").style.display = "none"; }

/* ======== REGISTER ======== */
async function register() {
  const email = document.getElementById("reg-email").value;
  const password = document.getElementById("reg-pass").value;
  const msg = document.getElementById("reg-msg");

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  msg.textContent = data.success ? "Cont creat!" : data.error;
}

/* ======== LOGIN ======== */
async function login() {
  const emailInput = document.getElementById("log-email").value;
  const password = document.getElementById("log-pass").value;
  const msg = document.getElementById("log-msg");

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: emailInput, password })
  });

  const data = await res.json();

  if (data.success) {
    token = data.token;
    email = emailInput;
    localStorage.setItem("token", token);
    localStorage.setItem("email", email);
    location.reload();
  } else {
    msg.textContent = data.error;
  }
}

/* ======== LOGOUT ======== */
function logout() {
  localStorage.clear();
  location.reload();
}

/* ======== CREATE POST ======== */
async function createPost() {
  const content = document.getElementById("post-content").value;
  const msg = document.getElementById("post-msg");

  const res = await fetch(API + "/post", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ content })
  });

  const data = await res.json();
  msg.textContent = data.success ? "Postat!" : data.error;

  document.getElementById("post-content").value = "";
  loadPosts();
}

/* ======== LOAD POSTS ======== */
async function loadPosts() {
  const container = document.getElementById("posts");
  container.innerHTML = "Se încarcă...";

  const res = await fetch(API + "/posts");
  const posts = await res.json();

  container.innerHTML = "";

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="meta">${p.email} • ${new Date(p.created_at).toLocaleString()}</div>
      <div>${p.content}</div>
    `;

    container.appendChild(div);
  });
}

loadPosts();
</script>

</body>
</html>
