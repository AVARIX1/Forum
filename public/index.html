<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Forum Inteligent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050509;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    #navbar {
      flex: 0 0 64px;
      background: #0b0b10;
      border-bottom: 1px solid #1f1f2b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 10;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      padding: 9px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .btn-primary:hover { background: #2563eb; }

    .btn-ghost {
      background: transparent;
      color: #e5e7eb;
      border: 1px solid #374151;
    }

    .btn-ghost:hover { background: #111827; }

    #user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #user-email-top {
      font-size: 14px;
      color: #9ca3af;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* LAYOUT */
    #layout {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* SIDEBAR */
    #sidebar {
      flex: 0 0 290px;
      background: #0b0b10;
      border-right: 1px solid #1f1f2b;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    #profile-box {
      background: #111827;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }

    #avatar-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      margin: 0 auto 10px auto;
      color: #e5e7eb;
    }

    #profile-name {
      font-weight: 600;
      font-size: 17px;
      margin-bottom: 4px;
    }

    #profile-email {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 8px;
      word-break: break-all;
    }

    #profile-bio {
      font-size: 13px;
      color: #d1d5db;
      min-height: 18px;
    }

    #profile-edit-btn {
      margin-top: 10px;
      width: 100%;
    }

    #categories {
      background: #111827;
      border-radius: 14px;
      padding: 12px;
    }

    #categories h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #categories ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #categories li {
      padding: 10px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #categories li span {
      font-size: 11px;
      color: #6b7280;
    }

    #categories li:hover,
    #categories li.active {
      background: #1f2937;
    }

    /* CONȚINUT */
    #content {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #search-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #111827;
      border-radius: 14px;
      padding: 10px 12px;
    }

    #search-input {
      flex: 1;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }

    #search-input::placeholder { color: #6b7280; }

    #post-box {
      background: #111827;
      border-radius: 14px;
      padding: 14px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    #topic-title {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }

    #topic-category {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }

    #post-content {
      width: 100%;
      min-height: 80px;
      max-height: 200px;
      resize: vertical;
      background: #020617;
      border-radius: 10px;
      border: 1px solid #1f2937;
      padding: 10px;
      color: #e5e7eb;
      font-size: 14px;
    }

    #post-msg {
      font-size: 13px;
      min-height: 16px;
    }

    #posts {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .post {
      background: #111827;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid #1f2937;
      transition: 0.15s;
    }

    .post:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .post-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .post-user {
      font-size: 14px;
      font-weight: 600;
    }

    .post-meta {
      font-size: 11px;
      color: #9ca3af;
    }

    .post-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .post-category-tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #1f2937;
      color: #9ca3af;
      margin-left: 6px;
    }

    .post-content {
      font-size: 14px;
      color: #e5e7eb;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* MODALE */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 50;
    }

    .modal-content {
      background: #020617;
      border-radius: 14px;
      padding: 20px;
      width: 90%;
      max-width: 380px;
      border: 1px solid #1f2937;
      position: relative;
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-content h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 9px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      resize: vertical;
    }

    .modal-content textarea { min-height: 60px; }

    .modal-content button {
      margin-top: 8px;
      width: 100%;
    }

    .modal p {
      font-size: 13px;
      min-height: 16px;
      margin: 4px 0 0 0;
    }

    .close {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 20px;
      cursor: pointer;
      color: #9ca3af;
    }

    .close:hover { color: #e5e7eb; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      #sidebar { display: none; }
      #layout { flex-direction: column; }
      #content { padding: 12px; }
    }

    @media (max-width: 600px) {
      #navbar { padding: 0 10px; }
      .logo { font-size: 20px; }
      #user-email-top { max-width: 120px; }
    }
  </style>
</head>

<body>
  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="logo">FORUM</div>
    <div class="nav-right">
      <button id="btn-login" class="btn btn-ghost">Login</button>
      <button id="btn-register" class="btn btn-primary">Register</button>
      <div id="user-info" style="display:none;">
        <span id="user-email-top"></span>
        <button id="btn-logout" class="btn btn-ghost">Logout</button>
      </div>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div id="layout">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div id="profile-box">
        <div id="avatar-circle">G</div>
        <div id="profile-name">Guest</div>
        <div id="profile-email"></div>
        <div id="profile-bio"></div>
        <button id="profile-edit-btn" class="btn btn-ghost">Editează profilul</button>
      </div>

      <div id="categories">
        <h3>Categorii</h3>
        <ul id="category-list">
          <li data-cat="Toate" class="active">Toate <span>•</span></li>
          <li data-cat="General">General <span>•</span></li>
          <li data-cat="Gaming">Gaming <span>•</span></li>
          <li data-cat="Programare">Programare <span>•</span></li>
          <li data-cat="Întrebări">Întrebări <span>•</span></li>
          <li data-cat="Off-topic">Off-topic <span>•</span></li>
        </ul>
      </div>
    </aside>

    <!-- CONȚINUT -->
    <main id="content">
      <div id="search-bar">
        <input id="search-input" type="text" placeholder="Caută topic după titlu, conținut sau categorie...">
        <button id="search-clear" class="btn btn-ghost">Reset</button>
      </div>

      <div id="post-box">
        <input id="topic-title" type="text" placeholder="Titlul topicului (ex: Cel mai tare joc)">
        <select id="topic-category">
          <option value="General">General</option>
          <option value="Gaming">Gaming</option>
          <option value="Programare">Programare</option>
          <option value="Întrebări">Întrebări</option>
          <option value="Off-topic">Off-topic</option>
        </select>
        <textarea id="post-content" placeholder="Descrie topicul / discuția..."></textarea>
        <button id="btn-post" class="btn btn-primary">Publică topic</button>
        <p id="post-msg"></p>
      </div>

      <div id="posts"></div>
    </main>
  </div>

  <!-- LOGIN MODAL -->
  <div class="modal" id="login-modal">
    <div class="modal-content">
      <span class="close" data-close="login-modal">×</span>
      <h2>Login</h2>
      <input id="log-email" type="email" placeholder="Email">
      <input id="log-pass" type="password" placeholder="Parolă">
      <button id="btn-login-submit" class="btn btn-primary">Intră</button>
      <p id="log-msg"></p>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="modal" id="register-modal">
    <div class="modal-content">
      <span class="close" data-close="register-modal">×</span>
      <h2>Register</h2>
      <input id="reg-email" type="email" placeholder="Email">
      <input id="reg-pass" type="password" placeholder="Parolă">
      <button id="btn-register-submit" class="btn btn-primary">Creează cont</button>
      <p id="reg-msg"></p>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div class="modal" id="profile-modal">
    <div class="modal-content">
      <span class="close" data-close="profile-modal">×</span>
      <h2>Profil</h2>
      <input id="prof-name" type="text" placeholder="Nume afișat (nu email)">
      <textarea id="prof-bio" placeholder="Despre tine..."></textarea>
      <button id="btn-profile-save" class="btn btn-primary">Salvează profilul</button>
      <p id="prof-msg"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
