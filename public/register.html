<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Înregistrare</h1>

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Parola">
  <button onclick="register()">Creează cont</button>

  <p>Ai deja cont? <a href="login.html">Login</a></p>
</div>

<script src="app.js"></script>
<script>
async function register() {
  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await api("/register", "POST", { username, email, password });

  if (res.error) return alert(res.error);

  alert("Cont creat! Acum te poți loga.");
  window.location.href = "login.html";
}
</script>

</body>
</html>
