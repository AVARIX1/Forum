<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Forum Inteligent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050509;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    #navbar {
      flex: 0 0 64px;
      background: #0b0b10;
      border-bottom: 1px solid #1f1f2b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 10;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      padding: 9px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .btn-primary:hover { background: #2563eb; }

    .btn-ghost {
      background: transparent;
      color: #e5e7eb;
      border: 1px solid #374151;
    }

    .btn-ghost:hover { background: #111827; }

    #user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #user-email-top {
      font-size: 14px;
      color: #9ca3af;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* LAYOUT */
    #layout {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* SIDEBAR */
    #sidebar {
      flex: 0 0 290px;
      background: #0b0b10;
      border-right: 1px solid #1f1f2b;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    #profile-box {
      background: #111827;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }

    #avatar-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      margin: 0 auto 10px auto;
      color: #e5e7eb;
    }

    #profile-name {
      font-weight: 600;
      font-size: 17px;
      margin-bottom: 4px;
    }

    #profile-email {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 8px;
      word-break: break-all;
    }

    #profile-bio {
      font-size: 13px;
      color: #d1d5db;
      min-height: 18px;
    }

    #profile-edit-btn {
      margin-top: 10px;
      width: 100%;
    }

    #news-box {
      background: #111827;
      border-radius: 14px;
      padding: 12px;
    }

    #news-box h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #news-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      color: #d1d5db;
    }

    #news-list li {
      margin-bottom: 6px;
    }

    /* CONȚINUT */
    #content {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #top-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #111827;
      border-radius: 14px;
      padding: 10px 12px;
    }

    #search-input {
      flex: 1;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }

    #search-input::placeholder { color: #6b7280; }

    /* VIEWS */
    #view-topics,
    #view-topic {
      background: #111827;
      border-radius: 14px;
      padding: 14px;
      min-height: 0;
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    #view-topics { display: flex; }

    #topics-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topic-card {
      background: #020617;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #1f2937;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      gap: 10px;
    }

    .topic-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .topic-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #e5e7eb;
      flex-shrink: 0;
    }

    .topic-main {
      flex: 1;
      min-width: 0;
    }

    .topic-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .topic-title {
      font-size: 15px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topic-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #1f2937;
      color: #9ca3af;
      flex-shrink: 0;
    }

    .topic-meta {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .topic-preview {
      font-size: 13px;
      color: #d1d5db;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* TOPIC VIEW (chat style) */
    #topic-header {
      border-bottom: 1px solid #1f2937;
      padding-bottom: 8px;
    }

    #topic-title-full {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #topic-tag-full {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #1f2937;
      color: #9ca3af;
      display: inline-block;
      margin-bottom: 6px;
    }

    #topic-meta-full {
      font-size: 12px;
      color: #9ca3af;
    }

    #topic-body-full {
      margin-top: 10px;
      font-size: 14px;
      color: #e5e7eb;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #topic-image {
      margin-top: 10px;
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid #1f2937;
      display: none;
    }

    #topic-chat {
      margin-top: 12px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .chat-msg {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .chat-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #e5e7eb;
      flex-shrink: 0;
    }

    .chat-bubble {
      background: #020617;
      border-radius: 10px;
      padding: 8px 10px;
      border: 1px solid #1f2937;
      max-width: 100%;
    }

    .chat-name-time {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 2px;
    }

    .chat-text {
      font-size: 14px;
      color: #e5e7eb;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .chat-image {
      margin-top: 6px;
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #1f2937;
    }

    #chat-form {
      margin-top: 10px;
      border-top: 1px solid #1f2937;
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #chat-text-input {
      width: 100%;
      min-height: 60px;
      max-height: 160px;
      resize: vertical;
      background: #020617;
      border-radius: 10px;
      border: 1px solid #1f2937;
      padding: 8px;
      color: #e5e7eb;
      font-size: 14px;
    }

    #chat-image-url {
      width: 100%;
      padding: 7px 8px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
    }

    #chat-msg {
      font-size: 13px;
      min-height: 16px;
    }

    /* MODALE */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 50;
    }

    .modal-content {
      background: #020617;
      border-radius: 14px;
      padding: 20px;
      width: 90%;
      max-width: 380px;
      border: 1px solid #1f2937;
      position: relative;
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-content h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 9px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      resize: vertical;
    }

    .modal-content textarea { min-height: 60px; }

    .modal-content button {
      margin-top: 8px;
      width: 100%;
    }

    .modal p {
      font-size: 13px;
      min-height: 16px;
      margin: 4px 0 0 0;
    }

    .close {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 20px;
      cursor: pointer;
      color: #9ca3af;
    }

    .close:hover { color: #e5e7eb; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      #sidebar { display: none; }
      #layout { flex-direction: column; }
      #content { padding: 12px; }
    }

    @media (max-width: 600px) {
      #navbar { padding: 0 10px; }
      .logo { font-size: 20px; }
      #user-email-top { max-width: 120px; }
    }
  </style>
</head>

<body>
  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="logo">FORUM</div>
    <div class="nav-right">
      <button id="btn-login" class="btn btn-ghost">Login</button>
      <button id="btn-register" class="btn btn-primary">Register</button>
      <div id="user-info" style="display:none;">
        <span id="user-email-top"></span>
        <button id="btn-logout" class="btn btn-ghost">Logout</button>
      </div>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div id="layout">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div id="profile-box">
        <div id="avatar-circle">G</div>
        <div id="profile-name">Guest</div>
        <div id="profile-email"></div>
        <div id="profile-bio"></div>
        <button id="profile-edit-btn" class="btn btn-ghost">Editează profilul</button>
      </div>

      <div id="news-box">
        <h3>Noutăți & update-uri</h3>
        <ul id="news-list">
          <li>• Sistem de topicuri cu vizualizare tip chat.</li>
          <li>• Căutare inteligentă după titlu și conținut.</li>
          <li>• Profil personalizat cu nume și bio.</li>
          <li>• Login persistent pentru utilizatori.</li>
        </ul>
      </div>
    </aside>

    <!-- CONȚINUT -->
    <main id="content">
      <div id="top-bar">
        <input id="search-input" type="text" placeholder="Caută topic după titlu, conținut sau link...">
        <button id="search-clear" class="btn btn-ghost">Reset</button>
        <button id="btn-new-topic" class="btn btn-primary">Topic nou</button>
      </div>

      <!-- LISTĂ TOPICURI -->
      <section id="view-topics">
        <div id="topics-list"></div>
      </section>

      <!-- VEDERE TOPIC (chat style) -->
      <section id="view-topic">
        <button id="btn-back" class="btn btn-ghost">← Înapoi la topicuri</button>

        <div id="topic-header">
          <div id="topic-title-full"></div>
          <div id="topic-tag-full"></div>
          <div id="topic-meta-full"></div>
          <div id="topic-body-full"></div>
          <img id="topic-image" alt="Imagine topic">
        </div>

        <div id="topic-chat"></div>

        <div id="chat-form">
          <textarea id="chat-text-input" placeholder="Scrie un răspuns în acest topic..."></textarea>
          <input id="chat-image-url" type="text" placeholder="Link imagine (opțional)">
          <button id="btn-chat-send" class="btn btn-primary">Trimite</button>
          <p id="chat-msg"></p>
        </div>
      </section>
    </main>
  </div>

  <!-- LOGIN MODAL -->
  <div class="modal" id="login-modal">
    <div class="modal-content">
      <span class="close" data-close="login-modal">×</span>
      <h2>Login</h2>
      <input id="log-email" type="email" placeholder="Email">
      <input id="log-pass" type="password" placeholder="Parolă">
      <button id="btn-login-submit" class="btn btn-primary">Intră</button>
      <p id="log-msg"></p>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="modal" id="register-modal">
    <div class="modal-content">
      <span class="close" data-close="register-modal">×</span>
      <h2>Register</h2>
      <input id="reg-email" type="email" placeholder="Email">
      <input id="reg-pass" type="password" placeholder="Parolă">
      <button id="btn-register-submit" class="btn btn-primary">Creează cont</button>
      <p id="reg-msg"></p>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div class="modal" id="profile-modal">
    <div class="modal-content">
      <span class="close" data-close="profile-modal">×</span>
      <h2>Profil</h2>
      <input id="prof-name" type="text" placeholder="Nume afișat (nu email)">
      <textarea id="prof-bio" placeholder="Despre tine..."></textarea>
      <button id="btn-profile-save" class="btn btn-primary">Salvează profilul</button>
      <p id="prof-msg"></p>
    </div>
  </div>

  <!-- NEW TOPIC MODAL -->
  <div class="modal" id="topic-modal">
    <div class="modal-content">
      <span class="close" data-close="topic-modal">×</span>
      <h2>Topic nou</h2>
      <input id="topic-title-input" type="text" placeholder="Titlul topicului">
      <textarea id="topic-body-input" placeholder="Descrierea topicului..."></textarea>
      <input id="topic-image-url-input" type="text" placeholder="Link imagine (opțional)">
      <button id="btn-topic-save" class="btn btn-primary">Publică topic</button>
      <p id="topic-msg"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
